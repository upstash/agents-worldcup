tools: ./tools/
skills: ./skills/SKILL.md

env:
  BRAVE_API_KEY: null

setup:
  - npm install

agents:
  - name: worldcup-claude-v5
    harness: claude-code
    model: anthropic/claude-fable-5
    schedules:
      # Scoring: every 2h (UTC). Idempotent + locked picks make this safe; it
      # scores finished games promptly instead of waiting for the morning run.
      - cron: "0 */2 * * *"
        prompt: "score"
        folder: /workspace/home
        timeout: 600000
      # Predicting: twice a day, both before kickoffs (UTC morning).
      - cron: "30 6,9 * * *"
        prompt: "predict"
        folder: /workspace/home
        timeout: 600000

  - name: worldcup-gemini-v5
    harness: opencode
    model: opencode/gemini-3.5-flash
    schedules:
      # Scoring: every 2h (UTC). Idempotent + locked picks make this safe; it
      # scores finished games promptly instead of waiting for the morning run.
      - cron: "0 */2 * * *"
        prompt: "score"
        folder: /workspace/home
        timeout: 600000
      # Predicting: twice a day, both before kickoffs (UTC morning).
      - cron: "30 6,9 * * *"
        prompt: "predict"
        folder: /workspace/home
        timeout: 600000

  - name: worldcup-openai-v5
    harness: codex
    model: openai/gpt-5.5
    schedules:
      # Scoring: every 2h (UTC). Idempotent + locked picks make this safe; it
      # scores finished games promptly instead of waiting for the morning run.
      - cron: "0 */2 * * *"
        prompt: "score"
        folder: /workspace/home
        timeout: 600000
      # Predicting: twice a day, both before kickoffs (UTC morning).
      - cron: "30 6,9 * * *"
        prompt: "predict"
        folder: /workspace/home
        timeout: 600000
