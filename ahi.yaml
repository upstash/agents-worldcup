tools: ./tools/
skills: ./skills/SKILL.md

env:
  BRAVE_API_KEY: null

setup:
  - npm install

agents:
  - name: worldcup-claude-v4
    harness: claude-code
    model: anthropic/claude-fable-5
    schedules:
      - cron: "30 9 * * *"
        prompt: "predict"
        folder: /workspace/home
        timeout: 600000

  - name: worldcup-gemini-v4
    harness: opencode
    model: opencode/gemini-3.5-flash
    schedules:
      - cron: "30 9 * * *"
        prompt: "predict"
        folder: /workspace/home
        timeout: 600000

  - name: worldcup-openai-v4
    harness: codex
    model: openai/gpt-5.5
    schedules:
      - cron: "30 9 * * *"
        prompt: "predict"
        folder: /workspace/home
        timeout: 600000
